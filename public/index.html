<!DOCTYPE html>
<html>
<head>
  <title>Hotpot Order</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .menu-item {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #ff4d4f;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #d9363e;
    }

    .cart {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 20px;
      font-size: 16px;
      background: #1890ff;
    }
  </style>
</head>

<body>

  <h1>🍲 Hotpot Menu</h1>

  <div id="menu"></div>

  <div class="cart">
    <h2>🛒 Selected Items</h2>
    <ul id="cart"></ul>
  </div>

  <h3>Table: <input id="table" value="1" /></h3>

  <button class="submit-btn" onclick="submitOrder()">Submit Order</button>

  <script>
    let selectedItems = [];

    fetch('/menu')
      .then(res => res.json())
      .then(data => {
        const menuDiv = document.getElementById('menu');

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = "menu-item";

          div.innerHTML = `
            <div>
              <strong>${item.name}</strong><br/>
              $${item.price}
            </div>
            <button onclick="addItem(${item.id}, '${item.name}')">Add</button>
          `;

          menuDiv.appendChild(div);
        });
      });

    function addItem(id, name) {
      selectedItems.push({ id, name, qty: 1 });
      renderCart();
    }

    function renderCart() {
      const cart = document.getElementById('cart');
      cart.innerHTML = "";

      selectedItems.forEach(item => {
        const li = document.createElement('li');
        li.innerText = `${item.name} x ${item.qty}`;
        cart.appendChild(li);
      });
    }

    function submitOrder() {
      const table = document.getElementById('table').value;

      fetch('/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table, items: selectedItems })
      })
      .then(res => res.json())
      .then(() => {
        alert("Order sent!");
        selectedItems = [];
        renderCart();
      });
    }
  </script>

</body>
</html>
