<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
</head>
<body>
  <h1>đź’ł Checkout</h1>

  <h2>Table: <input id="table" value="1" /></h2>

  <button onclick="loadOrders()">Load Orders</button>
  <button onclick="checkout()">Checkout</button>

  <ul id="orders"></ul>

  <h2>Total: $<span id="total">0</span></h2>

  <script>
    const menuMap = {
      1: { name: "ç‰›č‚‰éŤ‹", price: 300 },
      2: { name: "č±¬č‚‰éŤ‹", price: 280 },
      3: { name: "çľŠč‚‰éŤ‹", price: 320 }
    };

    function loadOrders() {
      const table = document.getElementById('table').value;

      fetch(`/table/${table}/orders`)
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById('orders');
          list.innerHTML = "";

          let total = 0;

          data.forEach(order => {
            const items = JSON.parse(order.items);

            items.forEach(i => {
              const item = menuMap[i.id];
              const subtotal = item.price * i.qty;

              total += subtotal;

              const li = document.createElement('li');
              li.innerText = `${item.name} x ${i.qty} = $${subtotal} [${order.status}]`;
              list.appendChild(li);
            });
          });

          document.getElementById('total').innerText = total;
        });
    }

    function checkout() {
  const table = parseInt(document.getElementById('table').value);

  fetch(`/checkout/${table}`, {
    method: 'PUT'
  })
  .then(res => res.json())
  .then(() => {
    alert("Payment completed!");
    loadOrders();
  })
  .catch(err => console.error(err));
}
  </script>
</body>
</html>
